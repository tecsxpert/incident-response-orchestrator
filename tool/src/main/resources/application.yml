spring:
  application:
    name: incident-response-orchestrator

  # Database Configuration
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/incident_db}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # Redis Configuration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  # Mail Configuration
  mail:
    host: sandbox.smtp.mailtrap.io
    port: 2525
    username: ${MAIL_USER:6033da39dc0333}
    password: ${MAIL_PASS:ffbc50a7bda518}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  cache:
    type: none

# JWT Configuration
jwt:
  # Using a placeholder for the secret to avoid hardcoding
  secret: ${JWT_SECRET:mySuperSecretDevelopmentKeyThatIsVeryLong12345!}
  expiration: 86400000